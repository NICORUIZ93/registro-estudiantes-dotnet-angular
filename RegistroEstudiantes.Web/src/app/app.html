<div class="app-wrapper">
  <nav class="navbar navbar-expand-lg navbar-dark bg-gradient-primary shadow-sm">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" href="/">
        <i class="bi bi-mortarboard-fill me-2 fs-4"></i>
        <span class="fw-bold">Sistema de Registro</span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="/" [class.active]="isActive('/')">
              <i class="bi bi-house-fill me-1"></i>Inicio
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/registro" [class.active]="isActive('/registro')">
              <i class="bi bi-person-plus-fill me-1"></i>Nuevo Estudiante
            </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="main-content">
    <router-outlet />
  </main>

  <footer class="footer bg-light border-top mt-5">
    <div class="container py-4">
      <div class="row align-items-center">
        <div class="col-md-6 text-center text-md-start mb-3 mb-md-0">
          <div class="d-flex align-items-center justify-content-center justify-content-md-start">
            <i class="bi bi-mortarboard-fill text-primary fs-4 me-2"></i>
            <span class="text-muted">
              <strong class="text-primary">Sistema de Registro de Estudiantes</strong>
            </span>
          </div>
        </div>
        <div class="col-md-6 text-center text-md-end">
          <p class="mb-1">
            <strong class="text-dark">NICOLAS ENRIQUE RUIZ VEGA</strong>
          </p>
          <p class="text-primary small mb-2">
            <i class="bi bi-code-square me-1"></i>DEVELOPER FULL STACK
          </p>
          <p class="text-muted small mb-2">
            &copy; {{ currentYear }} Todos los derechos reservados
          </p>
          <div class="mt-2">
            <span class="badge bg-primary me-1">
              <i class="bi bi-code-slash me-1"></i>Angular {{ angularVersion }}
            </span>
            <span class="badge bg-secondary">
              <i class="bi bi-bootstrap me-1"></i>Bootstrap 5
            </span>
          </div>
        </div>
      </div>
    </div>
  </footer>
</div>
